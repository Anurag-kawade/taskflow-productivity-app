<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Productivity App</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./js/script.js"></script>
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>
    <main>
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="./assets/images/todo-image.jpg" alt="To Do List Image">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="./assets/images/daily-planner.jpg" alt="Daily Planner Image">
                <h2>Daily Planner</h2>
            </div>
            <div class="motivation elem" id="2">
                <img src="./assets/images/motivation-image.jpg" alt="Motivation Image">
                <h2>Motivation</h2>
            </div>
            <div class="Pomodoro elem" id="3">
                <img src="./assets/images/pomodoro-timer.jpg" alt="Pomodoro Timer Image">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="daily elem" id="4">
                <img src="./assets/images/daily-goals.jpg" alt="Daily Goals Image">
                <h2>Daily Goals</h2>
            </div>
        </section>
        <section class="fullElem todo-list-fullpage">
            <h1>Your Personalised Task List</h1>
            <button class="back" id="0">Close</button>
            <div class="todo-container">
                <div class="left">
                    <form id="form">
                       <input type="text" placeholder="Enter Task">
                       <textarea placeholder="Enter Details" name="" id=""></textarea>
                       <div id="checkbox">
                       <input type="checkbox" name="" id="check-box">
                       <label for="check-box">Mark as Important!</label>
                       </div>
                       <button id="add-task">Add Task</button>
                    </form>
                </div>
                <div class="right">
                    
                </div>

            </div>
        </section>
        <section class="fullElem daily-planner-fullpage">
            <h2>Plan your Day to be more Productive</h2>
            <button class="back" id="1">Close</button>

            <div class="day-planner">
                           
            </div>
        </section>
        <section class="fullElem motivational-fullpage">
            <h1>Motivational Quote</h1>
            <button class="back" id="2">Close</button>
        </section>
        <section class="fullElem pomodoro-fullpage">
            <h1>Pomodoro Timer</h1>
            <button class="back" id="3">Close</button>
        </section>
        <section class="fullElem daily-goals-fullpage">
            <h1>Daily Goals</h1>
            <button class="back" id="4">Close</button>
        </section>
    </main>
</body>
</html>
